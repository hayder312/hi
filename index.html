<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة العمر ☕️😂</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        /* واجهة الخدعة للبدء */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #0f0f1a);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .btn-prank {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: #ff4757;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff4757;
            transition: transform 0.2s;
        }
        .btn-prank:active {
            transform: scale(0.95);
        }

        /* حاوية الهوسة الكبرى */
        #chaos-container {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .chaos-element {
            position: absolute;
            font-size: 2rem;
            font-weight: bold;
            transition: all 0.25s linear;
        }

        /* تأثير اهتزاز الشاشة المجنون */
        .shake {
            animation: crazy-shake 0.1s infinite;
        }
        @keyframes crazy-shake {
            0% { transform: translate(5px, 5px) rotate(0deg); }
            25% { transform: translate(-5px, -3px) rotate(-3deg); }
            50% { transform: translate(3px, -5px) rotate(3deg); }
            75% { transform: translate(-3px, 5px) rotate(-1deg); }
            100% { transform: translate(5px, -3px) rotate(2deg); }
        }

        /* النص النهائي الصادم */
        #final-text {
            position: absolute;
            font-size: 6rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 20px #fff, 0 0 40px #ff00ff, 0 0 80px #00ffff;
            z-index: 10;
            transform: scale(0) rotate(-720deg);
            opacity: 0;
            transition: all 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.5);
        }

        .show-text {
            transform: scale(1.2) rotate(0deg) !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="margin-bottom: 30px; font-size: 1.8rem;">شلون علاوي الءرد</h2>
        <button class="btn-prank" onclick="startThePrank()">اذا انت اقوى شاعر دوس الدكمة</button>
    </div>

    <div id="chaos-container"></div>

    <div id="final-text">علي گواد 😂☕️</div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const chaosContainer = document.getElementById('chaos-container');
        const finalText = document.getElementById('final-text');
        
        const colors = ['#ff0055', '#00ffcc', '#ffff00', '#ff00ff', '#00ff00', '#ff3300', '#ffffff'];
        const wordsAndEmojis = ['🔥', '⚡️', 'هوسةةةة', 'اكبسسس', 'شكو ماكو', '😂', '🚀', '💥', '⚠️', '🚨', '🎵', '☕️'];
        const elementsArray = [];
        
        let audioCtx;
        let musicInterval;
        let visualInterval;

        // تشغيل نظام الصوت البرمجي
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // 1. موسيقى حماسية سريعة جداً (حلال نغمات الكترونية بدون حقوق)
        function playHalalMusic() {
            let noteIndex = 0;
            const baseFreqs = [220, 261, 329, 392, 440, 523, 659]; // نغمات شرقية/حماسية
            
            musicInterval = setInterval(() => {
                if (!audioCtx) return;
                
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                // نوع النغمة ليعطي طابع ألعاب قديمة ومضحكة
                osc.type = noteIndex % 2 === 0 ? 'sawtooth' : 'square';
                
                // تسريع الرتم تدريجياً لزيادة التوتر
                let freq = baseFreqs[Math.floor(Math.random() * baseFreqs.length)];
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
                
                noteIndex++;
            }, 100); // سرعة جنونية للنغمات
        }

        // 2. صوت الانفجار الضخم عند النهاية
        function playExplosionSound() {
            const bufferSize = audioCtx.sampleRate * 2; // مدة الانفجار ثانيتين
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            // توليد ضوضاء بيضاء (White Noise) تشبه الانفجار
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            
            // فلتر لتضخيم الصوت وجعله مثل الانفجار الحقيقي
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1.5);
            
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);
            
            noiseNode.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            noiseNode.start();
        }

        // دالة بدء المقلب الكوني
        function startThePrank() {
            // إخفاء شاشة البداية وتشغيل الصوت
            startScreen.style.display = 'none';
            chaosContainer.style.display = 'block';
            document.body.classList.add('shake'); // ابدأ رج الشاشة من أول دقيقة!
            
            initAudio();
            playHalalMusic();

            // إنشاء عناصر الهوسة (100 عنصر طائر لزيادة الضغط الكارثي)
            for (let i = 0; i < 100; i++) {
                let el = document.createElement('div');
                el.className = 'chaos-element';
                el.innerText = wordsAndEmojis[Math.floor(Math.random() * wordsAndEmojis.length)];
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                
                chaosContainer.appendChild(el);
                elementsArray.push(el);
            }

            // حركة الهوسة السريعة (يروح ويجي بسرعة البرق)
            visualInterval = setInterval(() => {
                // تغيير خلفية الشاشة بشكل عشوائي ومجنون
                document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)] + '22'; // شفافية خفيفة عشان ما تنعمي العين
                
                elementsArray.forEach(el => {
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.top = Math.random() * 100 + 'vh';
                    el.style.transform = `scale(${Math.random() * 3}) rotate(${Math.random() * 360}deg)`;
                    el.style.color = colors[Math.floor(Math.random() * colors.length)];
                });
            }, 150); // تحديث الحركة كل 150 ملي ثانية (سرعة خارقة)

            // 3. اللحظة الحاسمة: الانفجار والمفاجأة بعد 6 ثوانٍ من الرعب 😂
            setTimeout(() => {
                // إيقاف الهوسة والموسيقى
                clearInterval(musicInterval);
                clearInterval(visualInterval);
                chaosContainer.style.display = 'none';
                document.body.classList.remove('shake');
                document.body.style.backgroundColor = '#05050a'; // رجوع الخلفية مظلمة فجأة

                // بوووم! تشغيل صوت الانفجار
                playExplosionSound();

                // إظهار النص جاي طيارة من بعيد ويفتر
                finalText.classList.add('show-text');

                // إطلاق عاصفة من فقاعات الاحتفال والـ Confetti من كل الجوانب
                let duration = 4000; // تستمر 4 ثواني
                let animationEnd = Date.now() + duration;
                let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 11 };

                function randomInRange(min, max) {
                    return Math.random() * (max - min) + min;
                }

                let interval = setInterval(function() {
                    let timeLeft = animationEnd - Date.now();

                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }

                    let particleCount = 50 * (timeLeft / duration);
                    // إطلاق من اليمين واليسار ومن النص
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                }, 250);

            }, 6000); // 6 ثواني من الضحك والارتباك
        }
    </script>
</body>
</html>
